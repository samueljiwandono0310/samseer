<svg xmlns="http://www.w3.org/2000/svg" width="360" height="760" viewBox="0 0 360 760" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16171B"/>
      <stop offset="100%" stop-color="#0F1014"/>
    </linearGradient>
  </defs>
  <rect width="360" height="760" fill="url(#bg3)"/>

  <!-- Status bar -->
  <text x="22" y="22" fill="#E6E6EA" font-size="12" font-weight="600">9:41</text>

  <!-- App bar -->
  <g transform="translate(0, 40)">
    <path d="M 24 20 l -6 6 l 6 6" stroke="#F2F2F4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="32" fill="#F2F2F4" font-size="18" font-weight="700">Stats</text>
  </g>

  <!-- Stat card 1: Total -->
  <g transform="translate(16, 100)">
    <rect width="160" height="106" rx="14" fill="#1B1C22"/>
    <rect x="14" y="14" width="28" height="28" rx="6" fill="rgba(91,107,255,0.18)"/>
    <rect x="20" y="20" width="16" height="16" rx="2" fill="none" stroke="#5B6BFF" stroke-width="1.7"/>
    <line x1="20" y1="26" x2="36" y2="26" stroke="#5B6BFF" stroke-width="1.7"/>
    <line x1="20" y1="32" x2="36" y2="32" stroke="#5B6BFF" stroke-width="1.7"/>
    <text x="50" y="32" fill="#A8AAB5" font-size="12">Total calls</text>
    <text x="14" y="92" fill="#F2F2F4" font-size="28" font-weight="700">128</text>
  </g>

  <!-- Stat card 2: Success -->
  <g transform="translate(184, 100)">
    <rect width="160" height="106" rx="14" fill="#1B1C22"/>
    <rect x="14" y="14" width="28" height="28" rx="6" fill="rgba(34,197,94,0.18)"/>
    <circle cx="28" cy="28" r="8" fill="none" stroke="#22C55E" stroke-width="1.7"/>
    <path d="M 24 28 l 3 3 l 6 -6" stroke="#22C55E" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="32" fill="#A8AAB5" font-size="12">Success rate</text>
    <text x="14" y="92" fill="#F2F2F4" font-size="28" font-weight="700">87%</text>
  </g>

  <!-- Stat card 3: Avg duration -->
  <g transform="translate(16, 216)">
    <rect width="160" height="106" rx="14" fill="#1B1C22"/>
    <rect x="14" y="14" width="28" height="28" rx="6" fill="rgba(59,130,246,0.18)"/>
    <circle cx="28" cy="28" r="8" fill="none" stroke="#3B82F6" stroke-width="1.7"/>
    <line x1="28" y1="22" x2="28" y2="28" stroke="#3B82F6" stroke-width="1.7"/>
    <line x1="28" y1="28" x2="32" y2="32" stroke="#3B82F6" stroke-width="1.7"/>
    <text x="50" y="32" fill="#A8AAB5" font-size="12">Avg duration</text>
    <text x="14" y="92" fill="#F2F2F4" font-size="28" font-weight="700">214ms</text>
  </g>

  <!-- Stat card 4: Errors -->
  <g transform="translate(184, 216)">
    <rect width="160" height="106" rx="14" fill="#1B1C22"/>
    <rect x="14" y="14" width="28" height="28" rx="6" fill="rgba(239,68,68,0.18)"/>
    <circle cx="28" cy="28" r="8" fill="none" stroke="#EF4444" stroke-width="1.7"/>
    <line x1="28" y1="24" x2="28" y2="29" stroke="#EF4444" stroke-width="1.7"/>
    <circle cx="28" cy="32" r="0.8" fill="#EF4444"/>
    <text x="50" y="32" fill="#A8AAB5" font-size="12">Errors</text>
    <text x="14" y="92" fill="#F2F2F4" font-size="28" font-weight="700">5</text>
  </g>

  <!-- Distribution card -->
  <g transform="translate(16, 340)">
    <rect width="328" height="148" rx="14" fill="#1B1C22"/>
    <text x="14" y="28" fill="#A8AAB5" font-size="12">Status distribution</text>
    <!-- bar -->
    <g transform="translate(14, 44)">
      <rect width="200" height="12" rx="6" fill="#22C55E"/>
      <rect x="200" width="40" height="12" fill="#3B82F6"/>
      <rect x="240" width="40" height="12" fill="#F59E0B"/>
      <rect x="280" width="20" height="12" rx="0" fill="#EF4444"/>
      <rect x="295" width="5" height="12" fill="#E11D48"/>
      <rect width="300" height="12" rx="6" fill="none"/>
    </g>
    <!-- legend -->
    <g transform="translate(14, 78)">
      <circle cx="4" cy="6" r="4" fill="#22C55E"/>
      <text x="14" y="10" fill="#E6E6EA" font-size="12">2xx · 92</text>
      <circle cx="84" cy="6" r="4" fill="#3B82F6"/>
      <text x="94" y="10" fill="#E6E6EA" font-size="12">3xx · 14</text>
      <circle cx="164" cy="6" r="4" fill="#F59E0B"/>
      <text x="174" y="10" fill="#E6E6EA" font-size="12">4xx · 16</text>
      <circle cx="244" cy="6" r="4" fill="#EF4444"/>
      <text x="254" y="10" fill="#E6E6EA" font-size="12">5xx · 4</text>
    </g>
    <g transform="translate(14, 106)">
      <circle cx="4" cy="6" r="4" fill="#E11D48"/>
      <text x="14" y="10" fill="#E6E6EA" font-size="12">Err · 2</text>
    </g>
  </g>
</svg>
