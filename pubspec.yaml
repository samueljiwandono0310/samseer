name: samseer
description: Beautiful HTTP inspector for Flutter — modern Material 3 alternative to Alice with Dio, http, and HttpClient support, plus shake-to-open.
version: 0.3.1
homepage: https://github.com/samueljiwandono0310/samseer
repository: https://github.com/samueljiwandono0310/samseer
issue_tracker: https://github.com/samueljiwandono0310/samseer/issues

topics:
  - http
  - inspector
  - debugging
  - networking
  - logger

environment:
  sdk: ^3.5.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Built-in HTTP client integrations
  dio: ^5.4.0
  http: ^1.2.0

  # Features
  sensors_plus: ^7.0.0

  # UI
  google_fonts: ^8.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
